<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>留学申请管理系统 | Study Abroad Manager</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Custom Notion-like styles */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, "Apple Color Emoji", Arial, sans-serif, "Segoe UI Emoji", "Segoe UI Symbol";
            background-color: #ffffff;
            color: #37352f;
        }
        .sidebar-item:hover {
            background-color: rgba(55, 53, 47, 0.08);
        }
        .sidebar-item.active {
            background-color: rgba(55, 53, 47, 0.08);
            font-weight: 600;
        }
        .notion-card {
            border: 1px solid rgba(55, 53, 47, 0.16);
            border-radius: 3px;
            transition: background 100ms ease-in;
        }
        .notion-card:hover {
            background: rgba(55, 53, 47, 0.03);
        }
        .whitespace-pre-wrap {
            white-space: pre-wrap;
        }
        .progress-bar {
            height: 8px;
            background-color: #ebebeb;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background-color: #50ddaa;
            transition: width 0.3s ease;
        }

        #mobile-overlay {
            display: none;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .sidebar-open {
                transform: translateX(0);
            }
            .sidebar-closed {
                transform: translateX(-100%);
            }
            #mobile-overlay.active {
                display: block;
            }
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- Mobile Header -->
    <header class="md:hidden fixed top-0 left-0 right-0 h-14 bg-white border-b border-gray-100 flex items-center justify-between px-4 z-40">
        <div class="flex items-center space-x-2 font-semibold">
            <i data-lucide="graduation-cap" class="w-5 h-5 text-green-600"></i>
            <span>留学助手</span>
        </div>
        <button onclick="toggleMobileSidebar()" class="p-2 text-gray-500">
            <i data-lucide="menu" class="w-6 h-6"></i>
        </button>
    </header>

    <!-- Mobile Overlay -->
    <div id="mobile-overlay" onclick="toggleMobileSidebar()" class="fixed inset-0 bg-black/20 z-40 transition-opacity"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed md:relative w-72 h-full bg-[#fbfbfa] border-r border-gray-200 flex flex-col z-50 transition-transform duration-300 sidebar-closed md:transform-none">
        <div class="p-4 flex items-center justify-between font-semibold text-lg border-b border-gray-50 md:border-none">
            <div class="flex items-center space-x-2">
                <i data-lucide="graduation-cap" class="w-6 h-6 text-green-600"></i>
                <span>留学申请助手</span>
            </div>
            <button onclick="toggleMobileSidebar()" class="md:hidden p-1 text-gray-400">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>
        
        <nav class="flex-1 px-2 py-4 space-y-1 overflow-y-auto">
            <button onclick="showView('projects'); closeMobileSidebar();" id="nav-projects" class="sidebar-item active w-full flex items-center space-x-2 px-3 py-2 rounded text-sm text-gray-700 transition-colors">
                <i data-lucide="layout-grid" class="w-4 h-4 text-gray-400"></i>
                <span>项目概览</span>
            </button>
            <button onclick="showView('tasks'); closeMobileSidebar();" id="nav-tasks" class="sidebar-item w-full flex items-center space-x-2 px-3 py-2 rounded text-sm text-gray-700 transition-colors">
                <i data-lucide="check-square" class="w-4 h-4 text-gray-400"></i>
                <span>任务中心</span>
            </button>
            <button onclick="showView('comparison'); closeMobileSidebar();" id="nav-comparison" class="sidebar-item w-full flex items-center space-x-2 px-3 py-2 rounded text-sm text-gray-700 transition-colors">
                <i data-lucide="columns" class="w-4 h-4 text-gray-400"></i>
                <span>要求对比</span>
            </button>

            <div class="mt-8 px-3">
                <p class="text-[10px] text-gray-400 uppercase font-bold tracking-wider mb-2">我的项目</p>
                <div id="sidebar-projects-list" class="space-y-1">
                    <!-- Project shortcuts will go here -->
                </div>
            </div>
        </nav>

        <div class="p-4 border-t border-gray-100 text-[10px] text-gray-400 text-center">
            Vibe Coding Mentor @ 2026
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto bg-white pt-14 md:pt-0">
        <div class="p-6 md:p-12 lg:px-24 max-w-7xl mx-auto">
            <div id="view-container">
                <!-- Content will be dynamically loaded here -->
            </div>
        </div>
    </main>

    <!-- Project Modal Overlay -->
    <div id="project-modal" class="fixed inset-0 bg-black bg-opacity-30 hidden items-center justify-center z-50">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-md p-6">
            <h2 class="text-xl font-bold mb-4">添加新项目</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs text-gray-400 font-bold mb-1">学校名称</label>
                    <input id="school-input" type="text" class="w-full border-b border-gray-200 py-2 focus:border-blue-400 outline-none text-sm" placeholder="例如：哈佛大学">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 font-bold mb-1">申请专业</label>
                    <input id="major-input" type="text" class="w-full border-b border-gray-200 py-2 focus:border-blue-400 outline-none text-sm" placeholder="例如：计算机科学">
                </div>
            </div>
            <div class="mt-8 flex justify-end space-x-3">
                <button onclick="closeModal()" class="px-4 py-2 text-sm text-gray-500 hover:bg-gray-50 rounded">取消</button>
                <button onclick="confirmAddProject()" class="px-4 py-2 text-sm bg-blue-500 text-white rounded hover:bg-blue-600">确定添加</button>
            </div>
        </div>
    </div>

    <!-- Requirements Modal Overlay -->
    <div id="req-modal" class="fixed inset-0 bg-black bg-opacity-30 hidden items-center justify-center z-50">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-lg p-6 max-h-[80vh] flex flex-col">
            <div class="flex justify-between items-center mb-6">
                <h2 id="req-modal-title" class="text-xl font-bold">配置申请要求</h2>
                <button onclick="addRequirementRow()" class="text-xs bg-green-50 text-green-600 px-2 py-1 rounded border border-green-200 hover:bg-green-100 transition flex items-center gap-1">
                    <i data-lucide="plus" class="w-3 h-3"></i> 添加要求项
                </button>
            </div>
            
            <input type="hidden" id="req-project-id">
            
            <div id="req-list-container" class="space-y-4 overflow-y-auto pr-2 flex-1 mb-6">
                <!-- Dynamic requirement rows will go here -->
            </div>

            <div class="pt-4 border-t border-gray-100 flex justify-end space-x-3">
                <button onclick="closeReqModal()" class="px-4 py-2 text-sm text-gray-500 hover:bg-gray-50 rounded">取消</button>
                <button onclick="saveRequirements()" class="px-4 py-2 text-sm bg-green-500 text-white rounded hover:bg-green-600">保存设置</button>
            </div>
        </div>
    </div>

    <!-- Task Edit Modal Overlay -->
    <div id="task-modal" class="fixed inset-0 bg-black bg-opacity-30 hidden items-center justify-center z-50">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-md p-6">
            <h2 class="text-xl font-bold mb-6">修改任务</h2>
            <input type="hidden" id="edit-task-id">
            <div class="space-y-4">
                <div>
                    <label class="block text-xs text-gray-400 font-bold mb-1">任务标题</label>
                    <input id="edit-task-title" type="text" class="w-full border-b border-gray-200 py-2 focus:border-blue-400 outline-none text-sm" placeholder="任务标题">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 font-bold mb-1">截止日期</label>
                    <input id="edit-task-deadline" type="date" class="w-full border-b border-gray-200 py-2 focus:border-blue-400 outline-none text-sm">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 font-bold mb-1">任务详情</label>
                    <textarea id="edit-task-desc" class="w-full px-3 py-2 border border-gray-200 rounded outline-none focus:border-blue-400 bg-white text-sm h-24" placeholder="任务详情..."></textarea>
                </div>
                <div>
                    <label class="block text-xs text-gray-400 font-bold mb-1">所属项目</label>
                    <select id="edit-task-project" class="w-full border-b border-gray-200 py-2 focus:border-blue-400 outline-none text-sm bg-white">
                        <option value="null">通用任务 (所有项目共享)</option>
                    </select>
                </div>
            </div>
            <div class="mt-8 flex justify-end space-x-3">
                <button onclick="closeTaskModal()" class="px-4 py-2 text-sm text-gray-500 hover:bg-gray-50 rounded">取消</button>
                <button onclick="saveTaskEdit()" class="px-4 py-2 text-sm bg-blue-500 text-white rounded hover:bg-blue-600">保存修改</button>
            </div>
        </div>
    </div>

    <!-- App Logic -->
    <script src="app.js"></script>
    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>
</html>
